<!DOCTYPE html>
<html lang="en">
<head>
<link rel="manifest" href="manifest.json">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#050a0f">
<title>⚡ Trade Journal</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: #050a0f; color: #e0e0e0; font-family: 'Courier New', monospace; min-height: 100vh; overscroll-behavior: none; }
  ::-webkit-scrollbar { width: 3px; } ::-webkit-scrollbar-track { background: #050a0f; } ::-webkit-scrollbar-thumb { background: #0d2233; }

  .hdr { background: linear-gradient(90deg,#050a0f,#0a1628); border-bottom: 2px solid #00e5ff; padding: 13px 16px; display: flex; align-items: center; justify-content: space-between; gap: 10px; flex-wrap: wrap; position: sticky; top: 0; z-index: 200; }
  .hdr-title { font-family: 'Rajdhani', sans-serif; font-size: clamp(15px,4vw,20px); font-weight: 700; letter-spacing: 3px; color: #00e5ff; text-transform: uppercase; }
  .hdr-sub { font-size: 9px; color: #4a7c91; letter-spacing: 2px; margin-top: 2px; }
  .hdr-right { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .save-dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; background: #00ff88; margin-left: 6px; vertical-align: middle; transition: background 0.4s; }

  .tabs { display: flex; border-bottom: 1px solid #0d2233; background: #080f18; padding: 0 12px; overflow-x: auto; scrollbar-width: none; position: sticky; top: 57px; z-index: 100; }
  .tabs::-webkit-scrollbar { display: none; }
  .tab { padding: 11px 14px; font-family: 'Rajdhani', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 2px; color: #4a7c91; cursor: pointer; border-bottom: 3px solid transparent; white-space: nowrap; text-transform: uppercase; transition: all 0.2s; user-select: none; }
  .tab.active { color: #00e5ff; border-bottom-color: #00e5ff; }

  .content { padding: clamp(14px,3vw,24px); max-width: 1100px; margin: 0 auto; padding-bottom: 90px; }
  .sec-label { display: flex; align-items: center; gap: 10px; font-family: 'Rajdhani', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 3px; color: #f0a500; text-transform: uppercase; margin-bottom: 14px; }
  .sec-label::after { content: ''; flex: 1; height: 1px; background: linear-gradient(90deg,#2a2000,transparent); }

  .cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px,1fr)); gap: 10px; margin-bottom: 24px; }
  .card { background: #070d16; border: 1px solid #0d2233; border-top: 3px solid; padding: 14px 12px; }
  .card-label { font-size: 8px; letter-spacing: 2px; color: #4a7c91; text-transform: uppercase; margin-bottom: 7px; }
  .card-val { font-family: 'Rajdhani', sans-serif; font-size: clamp(20px,5vw,30px); font-weight: 700; line-height: 1; word-break: break-all; }
  .card-note { font-size: 8px; color: #4a7c91; margin-top: 5px; }
  .card-tag { font-size: 8px; font-style: italic; margin-top: 3px; }

  .green{color:#00ff88}.red{color:#ff4466}.cyan{color:#00e5ff}.gold{color:#f0a500}.purple{color:#cc66ff}

  .tbl-wrap { overflow-x: auto; margin-bottom: 24px; -webkit-overflow-scrolling: touch; }
  table { width: 100%; border-collapse: collapse; }
  th { font-size: 8px; letter-spacing: 2px; color: #4a7c91; text-transform: uppercase; padding: 9px 10px; border-bottom: 1px solid #0d2233; text-align: left; white-space: nowrap; }
  td { padding: 11px 10px; border-bottom: 1px solid #0a1a26; font-size: 12px; vertical-align: middle; }
  tr:hover td { background: #080f18; }

  .btn { font-family: 'Rajdhani', sans-serif; font-weight: 700; letter-spacing: 2px; cursor: pointer; text-transform: uppercase; border: none; font-size: 11px; padding: 9px 14px; transition: all 0.2s; white-space: nowrap; }
  .btn-cyan  { background: transparent; border: 1px solid #00e5ff; color: #00e5ff; }
  .btn-cyan:hover  { background: #00e5ff22; }
  .btn-green { background: #00e5ff; color: #000; font-size: 12px; padding: 12px 22px; flex: 1; }
  .btn-green:hover { background: #00b8cc; }
  .btn-ghost { background: transparent; border: 1px solid #4a7c91; color: #4a7c91; font-size: 12px; padding: 12px 18px; }
  .btn-export{ background: transparent; border: 1px solid #00ff88; color: #00ff88; font-size: 10px; padding: 7px 12px; }
  .btn-import{ background: transparent; border: 1px solid #f0a500; color: #f0a500; font-size: 10px; padding: 7px 12px; }
  .del-btn { background: transparent; border: none; color: #1a3040; cursor: pointer; font-size: 14px; padding: 4px 8px; transition: color 0.2s; }
  .del-btn:hover { color: #ff4466; }

  .form-box { background: #070d16; border: 1px solid #0d2233; border-top: 3px solid #00e5ff; padding: 18px; margin-bottom: 20px; }
  .form-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px,1fr)); gap: 12px; }
  .field { display: flex; flex-direction: column; gap: 5px; }
  .field label { font-size: 8px; letter-spacing: 2px; color: #4a7c91; text-transform: uppercase; }
  .field input,.field select,.field textarea { background: #080f18; border: 1px solid #0d2233; color: #e0e0e0; font-family: 'Courier New', monospace; font-size: 15px; padding: 11px 10px; outline: none; width: 100%; -webkit-appearance: none; border-radius: 0; }
  .field input:focus,.field select:focus,.field textarea:focus { border-color: #00e5ff55; }
  .field select option { background: #080f18; }
  .field textarea { resize: vertical; }
  .form-actions { display: flex; gap: 10px; margin-top: 14px; flex-wrap: wrap; }

  .chips { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 14px; }
  .chip { padding: 5px 11px; font-size: 9px; letter-spacing: 1px; font-family: 'Rajdhani', sans-serif; font-weight: 700; cursor: pointer; border: 1px solid #0d2233; color: #4a7c91; background: transparent; text-transform: uppercase; transition: all 0.2s; }
  .chip.active { border-color: #00e5ff; color: #00e5ff; background: #00e5ff11; }

  .m-card { background: #070d16; border: 1px solid #0d2233; padding: 14px; margin-bottom: 8px; }
  .m-card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
  .m-card-meta { display: flex; gap: 16px; flex-wrap: wrap; }
  .m-meta { display: flex; flex-direction: column; gap: 2px; }
  .m-lbl { font-size: 8px; color: #4a7c91; letter-spacing: 1px; text-transform: uppercase; }
  .m-notes { margin-top: 9px; font-size: 11px; color: #4a7c91; border-top: 1px solid #0a1628; padding-top: 8px; line-height: 1.5; }

  .insight { background: #070d16; border: 1px solid #0d2233; border-left: 3px solid #f0a500; padding: 13px 16px; margin-bottom: 10px; }
  .insight-t { font-family: 'Rajdhani', sans-serif; font-size: 12px; font-weight: 700; color: #f0a500; letter-spacing: 2px; margin-bottom: 5px; }
  .insight-b { font-size: 12px; color: #a0b4c0; line-height: 1.6; }

  .streak-wrap { background: #070d16; border: 1px solid #0d2233; padding: 14px 16px; margin-bottom: 24px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .streak-dots { display: flex; gap: 4px; flex-wrap: wrap; }
  .dot { width: 12px; height: 12px; border-radius: 3px; }

  .scrip-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px,1fr)); gap: 10px; }
  .scrip-card { background: #070d16; border: 1px solid #0d2233; padding: 13px; }
  .bar-bg { background: #0a1628; border-radius: 2px; height: 3px; overflow: hidden; margin: 5px 0; }
  .bar-fill { height: 100%; background: linear-gradient(90deg,#00e5ff,#00ff88); border-radius: 2px; }
  .pf-row { display: flex; align-items: center; gap: 8px; }
  .pf-bg { flex:1; max-width:55px; background:#0a1628; border-radius:2px; height:3px; }
  .pf-fill { height:100%; background:linear-gradient(90deg,#00e5ff,#00ff88); border-radius:2px; }

  .empty { text-align: center; padding: 50px 20px; }
  .empty-icon { font-size: 36px; margin-bottom: 12px; }
  .empty-t { font-family: 'Rajdhani', sans-serif; font-size: 15px; font-weight: 700; color: #4a7c91; letter-spacing: 3px; margin-bottom: 8px; }
  .empty-s { font-size: 11px; color: #2a4a5a; margin-bottom: 18px; }

  /* backup notice */
  .backup-notice { background: #070d16; border: 1px solid #f0a50033; border-left: 3px solid #f0a500; padding: 12px 16px; margin-bottom: 20px; display: flex; gap: 12px; align-items: flex-start; flex-wrap: wrap; }
  .backup-notice-text { font-size: 11px; color: #8a9cac; line-height: 1.6; flex: 1; min-width: 200px; }
  .backup-notice-text strong { color: #f0a500; }
  .backup-btns { display: flex; gap: 8px; align-items: center; }

  .fab { position: fixed; bottom: 20px; right: 20px; width: 54px; height: 54px; background: #00e5ff; color: #000; border: none; border-radius: 50%; font-size: 26px; font-weight: 700; cursor: pointer; z-index: 300; box-shadow: 0 4px 24px #00e5ff55; display: flex; align-items: center; justify-content: center; }

  .toast { position: fixed; bottom: 84px; left: 50%; transform: translateX(-50%); background: #0a2a1a; border: 1px solid #00ff8844; color: #00ff88; font-family: 'Rajdhani', sans-serif; font-size: 12px; letter-spacing: 2px; padding: 10px 20px; z-index: 999; opacity: 0; transition: opacity 0.3s; pointer-events: none; white-space: nowrap; }
  .toast.show { opacity: 1; }

  .row-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; flex-wrap: wrap; gap: 10px; }

  @media (max-width: 640px) { .desktop-only { display: none !important; } }
  @media (min-width: 641px) { .mobile-only { display: none !important; } }

  input[type=number] { -moz-appearance: textfield; }
  input[type=number]::-webkit-inner-spin-button,
  input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
</style>
</head>
<body>

<div class="hdr">
  <div>
    <div class="hdr-title">⚡ Trade Journal <span class="save-dot" id="saveDot"></span></div>
    <div class="hdr-sub" id="hdrSub">LOADING...</div>
  </div>
  <div class="hdr-right">
    <button class="btn btn-export" onclick="exportJSON()">⬇ Backup</button>
    <button class="btn btn-import" onclick="document.getElementById('importFile').click()">⬆ Restore</button>
    <input type="file" id="importFile" accept=".json" style="display:none" onchange="importJSON(event)">
    <button class="btn btn-cyan desktop-only" onclick="openForm()">+ Log Trade</button>
  </div>
</div>

<div class="tabs">
  <div class="tab active" onclick="switchTab('dashboard')">📊 Dashboard</div>
  <div class="tab" onclick="switchTab('setups')">🎯 Setups</div>
  <div class="tab" onclick="switchTab('log')">📋 Log</div>
</div>

<div class="content">
  <div id="tab-dashboard"></div>
  <div id="tab-setups" style="display:none"></div>
  <div id="tab-log" style="display:none"></div>
</div>

<button class="fab" onclick="openForm()">+</button>
<div class="toast" id="toast"></div>

<script>
const DB_NAME = 'TradeJournalDB';
const DB_VER  = 1;
const STORE   = 'trades';
const SETUPS  = ['Breakout','Pullback','Momentum','Reversal','Gap & Go','VWAP Reclaim','Other'];

let trades      = [];
let db          = null;
let showForm    = false;
let filterSetup = 'ALL';
let activeTab   = 'dashboard';

// ── TOAST ──
function toast(msg, color) {
  color = color || '#00ff88';
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.style.color = color;
  el.style.background = color === '#00ff88' ? '#0a2a1a' : (color === '#ff4466' ? '#2a0a00' : '#1a1a00');
  el.style.borderColor = color + '44';
  el.classList.add('show');
  setTimeout(function(){ el.classList.remove('show'); }, 2500);
}

// ── INDEXEDDB ──
function openDB() {
  return new Promise(function(resolve, reject) {
    var req = indexedDB.open(DB_NAME, DB_VER);
    req.onupgradeneeded = function(e) {
      var d = e.target.result;
      if (!d.objectStoreNames.contains(STORE)) {
        d.createObjectStore(STORE, { keyPath: 'id' });
      }
    };
    req.onsuccess = function(e) { resolve(e.target.result); };
    req.onerror   = function(e) { reject(e.target.error); };
  });
}
function dbGetAll() {
  return new Promise(function(resolve, reject) {
    var tx  = db.transaction(STORE, 'readonly');
    var req = tx.objectStore(STORE).getAll();
    req.onsuccess = function(e) { resolve(e.target.result || []); };
    req.onerror   = function(e) { reject(e.target.error); };
  });
}
function dbPut(trade) {
  return new Promise(function(resolve, reject) {
    var tx  = db.transaction(STORE, 'readwrite');
    var req = tx.objectStore(STORE).put(trade);
    req.onsuccess = resolve;
    req.onerror   = function(e) { reject(e.target.error); };
  });
}
function dbDelete(id) {
  return new Promise(function(resolve, reject) {
    var tx  = db.transaction(STORE, 'readwrite');
    var req = tx.objectStore(STORE).delete(id);
    req.onsuccess = resolve;
    req.onerror   = function(e) { reject(e.target.error); };
  });
}
function dbClear() {
  return new Promise(function(resolve, reject) {
    var tx  = db.transaction(STORE, 'readwrite');
    var req = tx.objectStore(STORE).clear();
    req.onsuccess = resolve;
    req.onerror   = function(e) { reject(e.target.error); };
  });
}

// ── SAVE DOT ──
function setSaving(s) {
  document.getElementById('saveDot').style.background = s ? '#f0a500' : '#00ff88';
}
function updateSub() {
  document.getElementById('hdrSub').textContent = 'AUTO-SAVED · ' + trades.length + ' TRADES';
}

// ── EXPORT / IMPORT ──
function exportJSON() {
  if (!trades.length) { toast('No trades to backup', '#ff4466'); return; }
  var data = JSON.stringify({ version: 1, exported: new Date().toISOString(), trades: trades }, null, 2);
  var blob = new Blob([data], { type: 'application/json' });
  var url  = URL.createObjectURL(blob);
  var a    = document.createElement('a');
  var date = new Date().toISOString().split('T')[0];
  a.href = url; a.download = 'trade-journal-backup-' + date + '.json';
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
  toast('✓ Backup downloaded');
}

function importJSON(event) {
  var file = event.target.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = async function(e) {
    try {
      var data     = JSON.parse(e.target.result);
      var imported = data.trades || data;
      if (!Array.isArray(imported)) throw new Error('bad format');
      if (!confirm('Import ' + imported.length + ' trades? This will REPLACE your current data.')) return;
      await dbClear();
      for (var i = 0; i < imported.length; i++) await dbPut(imported[i]);
      trades = await dbGetAll();
      trades.sort(function(a,b){ return a.id - b.id; });
      updateSub(); render();
      toast('✓ Imported ' + imported.length + ' trades');
    } catch(err) { toast('Import failed — invalid file', '#ff4466'); }
  };
  reader.readAsText(file);
  event.target.value = '';
}

// ── HELPERS ──
function fmt(n) {
  var abs = Math.abs(n);
  if (abs >= 1e7) return '₹' + (n/1e7).toFixed(2) + 'Cr';
  if (abs >= 1e5) return '₹' + (n/1e5).toFixed(2) + 'L';
  if (abs >= 1e3) return '₹' + (n/1e3).toFixed(1) + 'K';
  return '₹' + n.toFixed(0);
}
function fmtFull(n) {
  return (n >= 0 ? '+' : '-') + '₹' + Math.abs(n).toLocaleString('en-IN', {maximumFractionDigits:0});
}
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── STATS ──
function calcStats() {
  if (!trades.length) return null;
  var winners  = trades.filter(function(t){ return t.pnl > 0; });
  var losers   = trades.filter(function(t){ return t.pnl <= 0; });
  var avgWin   = winners.length ? winners.reduce(function(s,t){ return s+t.pnl; },0)/winners.length : 0;
  var avgLoss  = losers.length  ? Math.abs(losers.reduce(function(s,t){ return s+t.pnl; },0)/losers.length) : 0;
  var totalPnl = trades.reduce(function(s,t){ return s+t.pnl; },0);
  var winRate  = (winners.length/trades.length)*100;
  var grossWin = winners.reduce(function(s,t){ return s+t.pnl; },0);
  var grossLoss= Math.abs(losers.reduce(function(s,t){ return s+t.pnl; },0));
  var pf       = grossLoss===0 ? Infinity : grossWin/grossLoss;

  var setupMap = {};
  trades.forEach(function(t) {
    if (!setupMap[t.setup]) setupMap[t.setup] = {wins:[],losses:[]};
    if (t.pnl > 0) setupMap[t.setup].wins.push(t.pnl);
    else setupMap[t.setup].losses.push(t.pnl);
  });
  var setupStats = Object.entries(setupMap).map(function(entry) {
    var name = entry[0], d = entry[1];
    var gw = d.wins.reduce(function(s,v){ return s+v; },0);
    var gl = Math.abs(d.losses.reduce(function(s,v){ return s+v; },0));
    var pfn = gl===0 ? 9999 : gw/gl;
    return { name:name, total:d.wins.length+d.losses.length,
      winRate:((d.wins.length/(d.wins.length+d.losses.length))*100).toFixed(0),
      pf:gl===0?'∞':pfn.toFixed(2)+'×', pfn:pfn, netPnl:gw-gl };
  }).sort(function(a,b){ return b.pfn-a.pfn; });

  var scripMap = {};
  trades.forEach(function(t) {
    if (!scripMap[t.scrip]) scripMap[t.scrip] = {wins:0,losses:0,totalPnl:0};
    scripMap[t.scrip].totalPnl += t.pnl;
    if (t.pnl > 0) scripMap[t.scrip].wins++; else scripMap[t.scrip].losses++;
  });

  return { totalPnl:totalPnl, winners:winners, losers:losers, winRate:winRate,
    avgWin:avgWin, avgLoss:avgLoss, ratio:avgLoss?avgWin/avgLoss:0,
    pf:pf, setupStats:setupStats, scripMap:scripMap };
}

// ── TABS ──
function switchTab(tab) {
  activeTab = tab;
  document.querySelectorAll('.tab').forEach(function(el,i) {
    el.classList.toggle('active', ['dashboard','setups','log'][i]===tab);
  });
  ['dashboard','setups','log'].forEach(function(t) {
    document.getElementById('tab-'+t).style.display = t===tab?'block':'none';
  });
  render();
}

// ── FORM ──
function openForm()  { showForm=true;  switchTab('log'); }
function closeForm() { showForm=false; render(); }

async function submitTrade() {
  var scrip  = document.getElementById('f-scrip').value.trim().toUpperCase();
  var pnlVal = parseFloat(document.getElementById('f-pnl').value);
  var capRaw = document.getElementById('f-capital').value;
  var capital= capRaw ? parseFloat(capRaw) : null;
  var hold   = parseInt(document.getElementById('f-hold').value);
  var date   = document.getElementById('f-date').value;
  var setup  = document.getElementById('f-setup').value;
  var dir    = document.getElementById('f-dir').value;
  var notes  = document.getElementById('f-notes').value.trim();

  if (!scrip || isNaN(pnlVal) || !hold || !date) {
    toast('Fill in Date, Scrip, P&L and Hold Days', '#ff4466'); return;
  }
  var trade = { id:Date.now(), date:date, scrip:scrip, setup:setup, direction:dir,
    pnl:pnlVal, capital:capital, holdDays:hold, notes:notes };

  setSaving(true);
  try {
    await dbPut(trade);
    trades.push(trade);
    trades.sort(function(a,b){ return a.id-b.id; });
    updateSub(); showForm=false; render();
    toast('✓ Trade saved');
  } catch(e) { toast('Save failed — try again', '#ff4466'); }
  setSaving(false);
}

async function deleteTrade(id) {
  if (!confirm('Delete this trade?')) return;
  setSaving(true);
  try {
    await dbDelete(id);
    trades = trades.filter(function(t){ return t.id!==id; });
    updateSub(); render(); toast('Trade deleted');
  } catch(e) { toast('Delete failed', '#ff4466'); }
  setSaving(false);
}

function setFilter(s) { filterSetup=s; renderLog(); }

// ── RENDER ──
function render() { renderDashboard(); renderSetups(); renderLog(); }

function renderDashboard() {
  var el = document.getElementById('tab-dashboard');
  var stats = calcStats();
  if (!stats) {
    el.innerHTML = '<div class="sec-label">⚡ What the Numbers Say</div><div class="empty"><div class="empty-icon">📈</div><div class="empty-t">No Trades Yet</div><div class="empty-s">Tap + to log your first trade</div><button class="btn btn-cyan" onclick="openForm()">+ Log First Trade</button></div>';
    return;
  }
  var pfD = stats.pf===Infinity ? '∞' : stats.pf.toFixed(2)+'×';
  var exp = (stats.avgWin*(stats.winRate/100)) - (stats.avgLoss*(1-stats.winRate/100));
  var best = stats.setupStats[0];
  var last12 = trades.slice(-12);
  var dots = last12.map(function(t){ return '<div class="dot" style="background:'+( t.pnl>0?'#00ff88':'#ff4466')+'" title="'+esc(t.scrip)+': '+fmtFull(t.pnl)+'"></div>'; }).join('');
  var streak=0, lastW=trades[trades.length-1].pnl>0;
  for(var i=trades.length-1;i>=0;i--){ if((trades[i].pnl>0)===lastW) streak++; else break; }

  el.innerHTML = '<div class="sec-label">⚡ What the Numbers Say</div>' +
    '<div class="cards">' +
    '<div class="card" style="border-top-color:#00ff88"><div class="card-label">Total P&amp;L</div><div class="card-val" style="color:'+(stats.totalPnl>=0?'#00ff88':'#ff4466')+'">'+fmt(stats.totalPnl)+'</div><div class="card-note">'+trades.length+' trades total</div></div>' +
    '<div class="card" style="border-top-color:#00e5ff"><div class="card-label">Win Rate</div><div class="card-val cyan">'+stats.winRate.toFixed(0)+'%</div><div class="card-note">'+stats.winners.length+'W / '+stats.losers.length+'L</div></div>' +
    '<div class="card" style="border-top-color:#f0a500"><div class="card-label">Avg Winner</div><div class="card-val gold">'+fmt(stats.avgWin)+'</div><div class="card-tag" style="color:#f0a50077">ride it hard</div></div>' +
    '<div class="card" style="border-top-color:#ff4466"><div class="card-label">Avg Loser</div><div class="card-val red">'+fmt(stats.avgLoss)+'</div><div class="card-tag" style="color:#ff446677">keep it small</div></div>' +
    '<div class="card" style="border-top-color:#00e5ff"><div class="card-label">Win/Loss Ratio</div><div class="card-val cyan">'+stats.ratio.toFixed(1)+'×</div><div class="card-note">avg win vs avg loss</div></div>' +
    '<div class="card" style="border-top-color:#cc66ff"><div class="card-label">Profit Factor</div><div class="card-val purple">'+pfD+'</div><div class="card-note">gross profit ÷ loss</div></div>' +
    '</div>' +
    '<div class="sec-label">🔥 Recent Streak</div>' +
    '<div class="streak-wrap"><span style="font-size:10px;color:#4a7c91;white-space:nowrap">Last '+last12.length+':</span><div class="streak-dots">'+dots+'</div><span style="font-size:10px;color:#4a7c91">'+streak+' trade '+(lastW?'winning':'losing')+' streak</span></div>' +
    '<div class="sec-label">💡 Auto Insights</div>' +
    (best ? '<div class="insight"><div class="insight-t">🏆 Best Setup: '+esc(best.name)+'</div><div class="insight-b">Profit factor <strong style="color:#00ff88">'+best.pf+'</strong> with <strong style="color:#00e5ff">'+best.winRate+'%</strong> win rate. Your sharpest edge — trade this more.</div></div>' : '') +
    '<div class="insight"><div class="insight-t">📐 Expectancy Per Trade</div><div class="insight-b">Each trade returns on average <strong style="color:'+(exp>=0?'#00ff88':'#ff4466')+'">'+fmt(exp)+'</strong>. '+(exp>=0?'Positive expectancy — your system makes money over time.':'Negative expectancy — tighten your criteria.')+'</div></div>' +
    (stats.avgLoss > 0 ? '<div class="insight"><div class="insight-t">📌 Loss Control</div><div class="insight-b">Avg loss <strong style="color:#ff4466">'+fmt(stats.avgLoss)+'</strong> vs avg win <strong style="color:#00ff88">'+fmt(stats.avgWin)+'</strong>. '+(stats.avgLoss < stats.avgWin*0.3 ? 'Well-controlled. Asymmetry is working in your favour.' : 'Consider tighter stops to improve your edge.')+'</div></div>' : '');
}

function renderSetups() {
  var el = document.getElementById('tab-setups');
  var stats = calcStats();
  if (!stats) {
    el.innerHTML = '<div class="sec-label">🎯 Best Setups</div><div class="empty"><div class="empty-icon">🎯</div><div class="empty-t">No Data Yet</div><div class="empty-s">Log some trades first</div></div>';
    return;
  }
  var rows = stats.setupStats.map(function(s) {
    return '<tr><td style="font-family:\'Rajdhani\',sans-serif;font-weight:700;font-size:14px;color:#e0e0e0">'+esc(s.name)+'</td>' +
      '<td style="color:#4a7c91">'+s.total+'</td>' +
      '<td><span style="color:'+(parseInt(s.winRate)>=60?'#00ff88':parseInt(s.winRate)>=40?'#f0a500':'#ff4466')+'">'+s.winRate+'%</span></td>' +
      '<td><div class="pf-row"><span style="font-family:\'Rajdhani\',sans-serif;font-weight:700;font-size:14px;color:'+(s.pfn>3?'#00ff88':s.pfn>1.5?'#f0a500':'#ff4466')+'">'+s.pf+'</span><div class="pf-bg"><div class="pf-fill" style="width:'+Math.min(s.pfn/10*100,100)+'%"></div></div></div></td>' +
      '<td style="font-family:\'Rajdhani\',sans-serif;font-weight:700;color:'+(s.netPnl>=0?'#00ff88':'#ff4466')+'">'+(s.netPnl>=0?'+':'')+fmt(s.netPnl)+'</td>' +
      '<td style="font-size:10px;color:#4a7c91;font-style:italic">'+(s.pf==='∞'?'Zero losses.':s.pfn>5?'Strong edge':s.pfn>2?'Solid':'Marginal')+'</td></tr>';
  }).join('');

  var scrips = Object.entries(stats.scripMap).sort(function(a,b){ return b[1].totalPnl-a[1].totalPnl; }).map(function(entry) {
    var sc=entry[0], d=entry[1];
    var wr=((d.wins/(d.wins+d.losses))*100);
    return '<div class="scrip-card"><div style="font-family:\'Rajdhani\',sans-serif;font-weight:700;font-size:15px;color:#00e5ff;margin-bottom:6px">'+esc(sc)+'</div>' +
      '<div style="display:flex;justify-content:space-between;margin-bottom:4px"><span style="font-size:10px;color:#4a7c91">'+d.wins+'W / '+d.losses+'L</span>' +
      '<span style="font-size:12px;color:'+(d.totalPnl>=0?'#00ff88':'#ff4466')+';font-weight:700">'+(d.totalPnl>=0?'+':'')+fmt(d.totalPnl)+'</span></div>' +
      '<div class="bar-bg"><div class="bar-fill" style="width:'+wr+'%"></div></div>' +
      '<div style="font-size:9px;color:#4a7c91">'+wr.toFixed(0)+'% win rate</div></div>';
  }).join('');

  el.innerHTML = '<div class="sec-label">🎯 Best Setups — where the real edge lives</div>' +
    '<div class="tbl-wrap"><table><thead><tr><th>Setup</th><th>Trades</th><th>Win %</th><th>Profit Factor</th><th>Net P&amp;L</th><th>Edge</th></tr></thead><tbody>'+rows+'</tbody></table></div>' +
    '<div class="sec-label">📈 Scrip Breakdown</div><div class="scrip-grid">'+scrips+'</div>';
}

function renderLog() {
  var el = document.getElementById('tab-log');
  var filtered = filterSetup==='ALL' ? trades : trades.filter(function(t){ return t.setup===filterSetup; });
  var today = new Date().toISOString().split('T')[0];

  var formHTML = showForm ? '<div class="form-box">' +
    '<div class="sec-label" style="margin-bottom:16px">📝 Log New Trade</div>' +
    '<div class="form-grid">' +
    '<div class="field"><label>Date</label><input type="date" id="f-date" value="'+today+'"></div>' +
    '<div class="field"><label>Scrip / Symbol</label><input type="text" id="f-scrip" placeholder="e.g. GPIL" autocapitalize="characters" autocomplete="off"></div>' +
    '<div class="field"><label>Setup</label><select id="f-setup">'+SETUPS.map(function(s){ return '<option>'+s+'</option>'; }).join('')+'</select></div>' +
    '<div class="field"><label>Direction</label><select id="f-dir"><option>LONG</option><option>SHORT</option></select></div>' +
    '<div class="field"><label>P&amp;L in ₹ (+ profit / − loss)</label><input type="number" id="f-pnl" placeholder="e.g. 4500 or -1200" inputmode="decimal"></div>' +
    '<div class="field"><label>Capital Deployed ₹ (optional)</label><input type="number" id="f-capital" placeholder="e.g. 50000" inputmode="decimal"></div>' +
    '<div class="field"><label>Hold Days</label><input type="number" id="f-hold" placeholder="5" min="1" inputmode="numeric"></div>' +
    '<div class="field" style="grid-column:1/-1"><label>Notes</label><textarea id="f-notes" rows="2" placeholder="What worked? What to improve?"></textarea></div>' +
    '</div><div class="form-actions"><button class="btn btn-ghost" onclick="closeForm()">Cancel</button><button class="btn btn-green" onclick="submitTrade()">Save Trade ↗</button></div></div>' : '';

  var chips = '<div class="chips">'+['ALL'].concat(SETUPS).map(function(s){ return '<button class="chip'+(filterSetup===s?' active':'')+'" onclick="setFilter(\''+s+'\')">'+s+'</button>'; }).join('')+'</div>';

  var tradesHTML = '';
  if (!trades.length) {
    tradesHTML = '<div class="empty"><div class="empty-icon">📋</div><div class="empty-t">No Trades Logged</div><div class="empty-s">Tap + to start tracking</div></div>';
  } else if (!filtered.length) {
    tradesHTML = '<div class="empty"><div class="empty-icon">🔍</div><div class="empty-t">No '+filterSetup+' Trades</div><div class="empty-s">Try a different filter</div></div>';
  } else {
    var rev = filtered.slice().reverse();
    var tableRows = rev.map(function(t) {
      var ret = t.capital ? ((t.pnl/t.capital)*100).toFixed(1) : null;
      return '<tr>' +
        '<td style="color:#4a7c91;font-size:11px;white-space:nowrap">'+esc(t.date)+'</td>' +
        '<td style="font-family:\'Rajdhani\',sans-serif;font-weight:700;color:#00e5ff;font-size:14px">'+esc(t.scrip)+'</td>' +
        '<td style="color:#a0b4c0;font-size:11px">'+esc(t.setup)+'</td>' +
        '<td style="color:'+(t.direction==='LONG'?'#00ff88':'#ff4466')+';font-size:11px">'+esc(t.direction)+'</td>' +
        '<td style="font-family:\'Rajdhani\',sans-serif;font-weight:700;color:'+(t.pnl>=0?'#00ff88':'#ff4466')+';font-size:14px">'+fmtFull(t.pnl)+'</td>' +
        '<td style="color:'+(ret?(parseFloat(ret)>=0?'#00ff88':'#ff4466'):'#2a4a5a')+';font-size:11px">'+(ret?(parseFloat(ret)>=0?'+':'')+ret+'%':'—')+'</td>' +
        '<td style="color:#4a7c91;font-size:11px">'+t.holdDays+'d</td>' +
        '<td style="color:#4a7c91;font-size:11px;max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="'+esc(t.notes)+'">'+(esc(t.notes)||'—')+'</td>' +
        '<td><button class="del-btn" onclick="deleteTrade('+t.id+')">✕</button></td></tr>';
    }).join('');

    var mCards = rev.map(function(t) {
      var ret = t.capital ? ((t.pnl/t.capital)*100).toFixed(1) : null;
      return '<div class="m-card">' +
        '<div class="m-card-top">' +
        '<div><span style="font-family:\'Rajdhani\',sans-serif;font-weight:700;color:#00e5ff;font-size:17px">'+esc(t.scrip)+'</span>' +
        '<span style="margin-left:8px;font-size:10px;color:#4a7c91">'+esc(t.date)+'</span></div>' +
        '<div style="display:flex;align-items:center;gap:8px">' +
        '<span style="font-family:\'Rajdhani\',sans-serif;font-weight:700;color:'+(t.pnl>=0?'#00ff88':'#ff4466')+';font-size:16px">'+fmtFull(t.pnl)+'</span>' +
        '<button class="del-btn" onclick="deleteTrade('+t.id+')">✕</button></div></div>' +
        '<div class="m-card-meta">' +
        '<div class="m-meta"><span class="m-lbl">Setup</span><span style="color:#a0b4c0;font-size:12px">'+esc(t.setup)+'</span></div>' +
        '<div class="m-meta"><span class="m-lbl">Dir</span><span style="color:'+(t.direction==='LONG'?'#00ff88':'#ff4466')+';font-size:12px">'+esc(t.direction)+'</span></div>' +
        '<div class="m-meta"><span class="m-lbl">Hold</span><span style="color:#4a7c91;font-size:12px">'+t.holdDays+'d</span></div>' +
        (ret?'<div class="m-meta"><span class="m-lbl">Return</span><span style="color:'+(parseFloat(ret)>=0?'#00ff88':'#ff4466')+';font-size:12px">'+(parseFloat(ret)>=0?'+':'')+ret+'%</span></div>':'') +
        '</div>' + (t.notes?'<div class="m-notes">'+esc(t.notes)+'</div>':'') + '</div>';
    }).join('');

    tradesHTML =
      '<div class="tbl-wrap desktop-only" style="background:#070d16;border:1px solid #0d2233"><table><thead><tr><th>Date</th><th>Scrip</th><th>Setup</th><th>Dir</th><th>P&amp;L</th><th>% Ret</th><th>Hold</th><th>Notes</th><th></th></tr></thead><tbody>'+tableRows+'</tbody></table></div>' +
      '<div class="mobile-only">'+mCards+'</div>';
  }

  var topBar = '<div class="row-top"><div class="sec-label" style="margin-bottom:0">📋 Trades ('+filtered.length+')</div>'+(showForm?'':'<button class="btn btn-cyan desktop-only" onclick="openForm()">+ Log Trade</button>')+'</div>';

  // Backup notice shown in log tab
  var notice = '<div class="backup-notice"><div class="backup-notice-text"><strong>💾 How saving works:</strong> Trades are saved automatically in your browser\'s database (IndexedDB). They persist even after closing Chrome. Use <strong>⬇ Backup</strong> in the header to download a JSON file as extra safety, and <strong>⬆ Restore</strong> to load it back.</div></div>';

  el.innerHTML = formHTML + notice + topBar + chips + tradesHTML;
}

// ── INIT ──
(async function() {
  try {
    db = await openDB();
    trades = await dbGetAll();
    trades.sort(function(a,b){ return a.id-b.id; });
  } catch(e) {
    // Fallback to localStorage if IndexedDB fails
    try { trades = JSON.parse(localStorage.getItem('tj_fallback')||'[]'); } catch(_){ trades=[]; }
    toast('⚠ Using fallback storage — backup regularly', '#f0a500');
  }
  updateSub();
  render();
})();
</script>
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('service-worker.js')
    .then(() => console.log('SW registered'));
}
</script>
